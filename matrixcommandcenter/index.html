      <PageHead title="Notifications" sub={`${unread} unread`}
        actions={<><Btn variant="ghost" onClick={markAllNotifs}>Mark all read</Btn><Btn variant="dark" icon="trash" onClick={clearNotifs}>Clear</Btn></>}/>

      <div style={{ display:'flex',gap:8,marginBottom:18,flexWrap:'wrap' }}>
        <button onClick={()=>setFilter('all')} style={{ padding:'7px 14px',borderRadius:8,fontSize:13,fontWeight:600,
          background:filter==='all'?C.cyanDim:C.bg2,color:filter==='all'?C.cyan:C.textDim,border:`1px solid ${C.border}` }}>All</button>
        {Object.entries(types).map(([k,v])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{ padding:'7px 14px',borderRadius:8,fontSize:13,fontWeight:600,
            display:'inline-flex',alignItems:'center',gap:6,
            background:filter===k?`${v.color}22`:C.bg2,color:filter===k?v.color:C.textDim,border:`1px solid ${C.border}` }}>
            <Icon name={v.icon} size={14}/>{v.label}
          </button>
        ))}
      </div>

      <div style={{ display:'flex',flexDirection:'column',gap:10,maxWidth:760 }}>
        {shown.sort((a,b)=>b.ts-a.ts).map(n=>{ const t=types[n.type];
          return (
            <Card key={n.id} pad={15} hover onClick={()=>markNotif(n.id)}
              style={{ display:'flex',gap:13,alignItems:'flex-start',
                borderLeft:`3px solid ${n.read?C.border:t.color}`,opacity:n.read?0.65:1 }}>
              <div style={{ width:38,height:38,borderRadius:11,background:`${t.color}1c`,display:'grid',placeItems:'center',flex:'0 0 auto' }}>
                <Icon name={t.icon} size={18} color={t.color}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                  <span style={{ fontSize:14,fontWeight:700 }}>{n.title}</span>
                  {!n.read && <span style={{ width:7,height:7,borderRadius:'50%',background:t.color }}/>}
                  <span style={{ marginLeft:'auto',fontSize:11.5,color:C.textMuted }}>{relTime(n.ts)}</span>
                </div>
                <p style={{ fontSize:13,color:C.textDim,marginTop:4,lineHeight:1.45 }}>{n.body}</p>
              </div>
            </Card>
          ); })}
        {!shown.length && <p style={{ color:C.textDim,textAlign:'center',padding:40 }}>No notifications.</p>}
      </div>
    </div>
  );
}

/* ============================================================
   REPORTS
   ============================================================ */
function Reports(){
  const { toast, appts, leads } = useApp();
  const [from,setFrom]=useState(addDays(TODAY,-30));
  const [to,setTo]=useState(TODAY);
  const live=(appts||[]).filter(a=>a.status!=='cancelled');
  const bd=serviceBreakdown(live);
  const monthly=revMonthly(live);
  const wonCount=(leads||[]).filter(l=>l.stage==='won').length;
  const totalLeads=(leads||[]).length;
  const closeRate=totalLeads?Math.round(wonCount/totalLeads*100)+'% close':BLANK;
  const rangeRev=sumRange(live,from,to);
  const reports=[
    { title:'Revenue Report', desc:'Daily/weekly/monthly breakdown from booked jobs', icon:'dollar', color:C.green, stat:rangeRev>0?fmt$(rangeRev):BLANK },
    { title:'Lead Conversion', desc:'Pipeline, sources & win rate analysis', icon:'zap', color:C.gold, stat:closeRate },
    { title:'Service Performance', desc:'Revenue & margin by service category', icon:'chart', color:C.cyan, stat:bd.length?bd.length+' services':BLANK },
    { title:'Customer Retention', desc:'Repeat rate, churn & lifetime value', icon:'users', color:C.purple, stat:BLANK },
  ];
  const lineData=monthly.map(m=>({ month:m.month, revenue:m.revenue }));

  return (
    <div className="fade-in main-pad" style={{ padding:'26px 30px',overflowY:'auto',flex:1 }}>
      <PageHead title="Reports" sub="Generate & export business intelligence"/>

      <Card pad={16} style={{ display:'flex',alignItems:'center',gap:14,marginBottom:18,flexWrap:'wrap' }}>
        <Icon name="calendar" size={18} color={C.cyan}/>
        <span style={{ fontSize:13,color:C.textDim,fontWeight:600 }}>Date Range:</span>
        <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{ width:'auto' }}/>
        <span style={{ color:C.textDim }}>→</span>
        <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{ width:'auto' }}/>
        <div style={{ marginLeft:'auto',display:'flex',gap:10 }}>
          <Btn variant="ghost" icon="download" onClick={()=>toast('Exported to PDF')}>PDF</Btn>
          <Btn variant="soft" icon="download" onClick={()=>toast('Exported to Excel')}>Excel</Btn>
        </div>
      </Card>

      <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14,marginBottom:18 }} className="grid-resp">
        {reports.map(r=>(
          <Card key={r.title} pad={18} hover onClick={()=>toast(`Generating ${r.title}...`,'info')}>
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12 }}>
              <div style={{ width:40,height:40,borderRadius:11,background:`${r.color}1c`,display:'grid',placeItems:'center' }}>
                <Icon name={r.icon} size={19} color={r.color}/>
              </div>
              <span style={{ fontSize:15,fontWeight:800,color:r.color }}>{r.stat}</span>
            </div>
            <div style={{ fontSize:15,fontWeight:700,marginBottom:5 }}>{r.title}</div>
            <p style={{ fontSize:12.5,color:C.textDim,lineHeight:1.45 }}>{r.desc}</p>
            <div style={{ display:'flex',gap:8,marginTop:14 }}>
              <Btn size="sm" variant="ghost" icon="download" onClick={e=>{e.stopPropagation();toast('Exported to PDF');}}>PDF</Btn>
              <Btn size="sm" variant="dark" icon="download" onClick={e=>{e.stopPropagation();toast('Exported to Excel');}}>Excel</Btn>
            </div>
          </Card>
        ))}
      </div>

      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:16 }} className="grid-resp">
        <Card pad={20}>
          <h3 style={{ fontSize:15,fontWeight:700,marginBottom:14 }}>Monthly Revenue</h3>
          {lineData.length ? (
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={lineData} margin={{ top:5,right:8,left:-20,bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" vertical={false}/>
              <XAxis dataKey="month" tick={{ fontSize:11 }} axisLine={false} tickLine={false}/>
              <YAxis tick={{ fontSize:10 }} axisLine={false} tickLine={false}/>
              <RTooltip content={<ChartTip money/>}/>
              <Line type="monotone" dataKey="revenue" stroke={C.green} strokeWidth={2.5} dot={{ r:3 }} name="Revenue"/>
            </LineChart>
          </ResponsiveContainer>
          ) : <div style={{ padding:'30px 20px',textAlign:'center',color:C.textDim,fontSize:13 }}>No booked revenue yet.</div>}
        </Card>
        <Card pad={20}>
          <h3 style={{ fontSize:15,fontWeight:700,marginBottom:14 }}>Services Sold (Revenue)</h3>
          {bd.length ? (
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={bd} layout="vertical" margin={{ top:5,right:12,left:30,bottom:0 }}>
              <XAxis type="number" tick={{ fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>'$'+v/1000+'k'}/>
              <YAxis type="category" dataKey="name" tick={{ fontSize:10 }} axisLine={false} tickLine={false} width={90}/>
              <RTooltip content={<ChartTip money/>} cursor={{ fill:C.cyanDim }}/>
              <Bar dataKey="value" radius={[0,5,5,0]} name="Revenue">
                {bd.map((e,i)=><Cell key={i} fill={e.color}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          ) : <div style={{ padding:'30px 20px',textAlign:'center',color:C.textDim,fontSize:13 }}>No service revenue yet.</div>}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   LAYOUT — Sidebar, Topbar, Shell
   ============================================================ */
function BrandMark({ size=42 }){
  const [err,setErr]=useState(false);
  if(!err) return (
    <img src="logo.png" alt="Matrix Mobile Details" onError={()=>setErr(true)}
      style={{ width:size,height:size,objectFit:'contain',flex:'0 0 auto',borderRadius:10,
        filter:'drop-shadow(0 0 10px rgba(31,197,106,0.35))' }}/>
  );
  return (
    <div style={{ width:size,height:size,borderRadius:12,flex:'0 0 auto',position:'relative',
      background:'linear-gradient(135deg,#1fc56a,#e0b73c)',display:'grid',placeItems:'center',
      boxShadow:'0 0 18px rgba(31,197,106,0.5)' }}>
      <span style={{ fontSize:size*0.5,fontWeight:900,color:'#06090c',fontStyle:'italic' }}>M</span>
    </div>
  );
}
function NavItem({ item, active, onClick, badge, collapsed }){
  const [h,setH]=useState(false);
  return (
    <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{ display:'flex',alignItems:'center',gap:12,padding:collapsed?'11px':'11px 14px',borderRadius:11,
        width:'100%',position:'relative',transition:'all .15s',justifyContent:collapsed?'center':'flex-start',
        background:active?'linear-gradient(135deg,rgba(31,197,106,0.16),rgba(224,183,60,0.12))':h?C.bg3:'transparent',
        color:active?C.cyanBright:h?C.text:C.textDim,
        border:`1px solid ${active?'rgba(31,197,106,0.3)':'transparent'}` }}>
      {active && <span style={{ position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',width:3,height:18,borderRadius:3,background:C.cyan,boxShadow:`0 0 8px ${C.cyan}` }}/>}
      <Icon name={item.icon} size={19} color={active?C.cyan:'currentColor'}/>
      {!collapsed && <span style={{ fontSize:14,fontWeight:active?700:500,flex:1,textAlign:'left' }}>{item.label}</span>}
      {!collapsed && badge>0 && <span style={{ fontSize:11,fontWeight:800,color:'#04101c',background:C.gold,
        borderRadius:20,padding:'1px 7px',minWidth:20,textAlign:'center' }}>{badge}</span>}
    </button>
  );
}

function Sidebar(){
  const { page, setPage, notifs, user, setUser } = useApp();
  const unread=notifs.filter(n=>!n.read).length;
  const me=teamById(user);
  return (
    <aside className="sidebar-desktop" style={{ width:248,flex:'0 0 auto',height:'100vh',
      background:'linear-gradient(180deg,rgba(10,16,12,0.98),rgba(6,9,12,0.98))',
      borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',padding:'20px 14px' }}>
      {/* Logo */}
      <div style={{ display:'flex',alignItems:'center',gap:12,padding:'4px 8px 20px',marginBottom:6,borderBottom:`1px solid ${C.border}` }}>
        <BrandMark size={44}/>
        <div>
          <div style={{ fontSize:15,fontWeight:800,letterSpacing:.5,
            background:'linear-gradient(90deg,#5ef0a0,#fff 60%,#e0b73c)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent' }}>MATRIX</div>
          <div style={{ fontSize:10,color:C.textDim,letterSpacing:1.5 }}>COMMAND CENTER</div>
        </div>
      </div>

      <nav style={{ display:'flex',flexDirection:'column',gap:4,flex:1,overflowY:'auto',marginTop:8 }}>
        {NAV.map(item=>(
          <NavItem key={item.id} item={item} active={page===item.id} onClick={()=>setPage(item.id)}
            badge={item.id==='notifications'?unread:0}/>
        ))}
      </nav>

      {/* User switcher */}
      <div style={{ marginTop:8,paddingTop:14,borderTop:`1px solid ${C.border}` }}>
        <div style={{ display:'flex',alignItems:'center',gap:10,padding:'8px 8px',borderRadius:11,background:C.bg2 }}>
          <Avatar id={user} size={36} ring/>
          <div style={{ flex:1,minWidth:0 }}>
            <div style={{ fontSize:13.5,fontWeight:700 }}>{me.name}</div>
            <div style={{ fontSize:11,color:C.textDim }}>{me.role}</div>
          </div>
          <button onClick={()=>setUser(user==='habib'?'partner':'habib')} title="Switch partner"
            style={{ width:30,height:30,borderRadius:8,background:C.bg3,color:C.textDim,display:'grid',placeItems:'center' }}>
            <Icon name="logout" size={15}/>
          </button>
        </div>
      </div>
    </aside>
  );
}

function MobileNav(){
  const { page, setPage, notifs } = useApp();
  const unread=notifs.filter(n=>!n.read).length;
  const items=NAV.filter(n=>['dashboard','schedule','tasks','finance','notifications'].includes(n.id));
  return (
    <nav className="mobile-nav" style={{ position:'fixed',bottom:0,left:0,right:0,zIndex:60,height:64,
      background:'rgba(6,12,24,0.97)',borderTop:`1px solid ${C.border}`,backdropFilter:'blur(12px)',
      display:'none',alignItems:'center',justifyContent:'space-around',padding:'0 8px' }}>
      {items.map(item=>{ const active=page===item.id;
        return (
          <button key={item.id} onClick={()=>setPage(item.id)} style={{ display:'flex',flexDirection:'column',
            alignItems:'center',gap:3,padding:'6px 12px',position:'relative',color:active?C.cyan:C.textDim }}>
            {item.id==='notifications'&&unread>0 && <span style={{ position:'absolute',top:2,right:8,width:8,height:8,borderRadius:'50%',background:C.gold }}/>}
            <Icon name={item.icon} size={21} color={active?C.cyan:'currentColor'}/>
            <span style={{ fontSize:9.5,fontWeight:active?700:500 }}>{item.label.split(' ')[0]}</span>
          </button>
        ); })}
    </nav>
  );
}

function Topbar(){
  const { setPage, notifs, page } = useApp();
  const unread=notifs.filter(n=>!n.read).length;
  return (
    <div className="hide-mobile" style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 30px',
      borderBottom:`1px solid ${C.border}`,background:'rgba(6,12,24,0.6)',backdropFilter:'blur(8px)',flex:'0 0 auto' }}>
      <div style={{ position:'relative',flex:1,maxWidth:420 }}>
        <span style={{ position:'absolute',left:13,top:'50%',transform:'translateY(-50%)' }}><Icon name="search" size={16} color={C.textDim}/></span>
        <input placeholder="Search customers, jobs, tasks..." style={{ paddingLeft:38,background:C.bg2 }}/>
      </div>
      <div style={{ marginLeft:'auto',display:'flex',alignItems:'center',gap:6 }}>
        <span className="dot-live"/>
        <span style={{ fontSize:12,color:C.textDim,fontWeight:600 }}>Live</span>
      </div>
      <button onClick={()=>setPage('notifications')} style={{ position:'relative',width:38,height:38,borderRadius:10,
        background:C.bg2,border:`1px solid ${C.border}`,display:'grid',placeItems:'center',color:C.text }}>
        <Icon name="bell" size={18}/>
        {unread>0 && <span style={{ position:'absolute',top:-4,right:-4,fontSize:10,fontWeight:800,color:'#04101c',
          background:C.gold,borderRadius:20,padding:'1px 6px',minWidth:18,textAlign:'center' }}>{unread}</span>}
      </button>
      <button style={{ width:38,height:38,borderRadius:10,background:C.bg2,border:`1px solid ${C.border}`,display:'grid',placeItems:'center',color:C.text }}>
        <Icon name="settings" size={18}/>
      </button>
    </div>
  );
}

const PAGES={ dashboard:Dashboard, schedule:Schedule, tasks:Tasks, ideas:Ideas, finance:Finance, goals:Goals, team:Team, reports:Reports, notifications:Notifications };

function CharacterSelect(){
  const { picked, chooseCharacter } = useApp();
  const [hov,setHov]=useState(null);
  if(picked) return null;
  const chars=[
    { id:'habib',   title:'Darth Habib',   sub:'Sith Lord of the Detail',     color:C.red,   glow:'rgba(255,90,90,.55)',  tag:'THE DARK SIDE' },
    { id:'partner', title:'Padawan Ryan',  sub:'Apprentice of the Shine',     color:C.green, glow:'rgba(34,211,107,.5)',  tag:'THE LIGHT SIDE' },
  ];
  return (
    <div className="fade-in" style={{ position:'fixed',inset:0,zIndex:400,
      background:'radial-gradient(circle at 50% 25%, #0c120f, #04060a 72%)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,overflow:'auto' }}>
      <div style={{ textAlign:'center',marginBottom:34 }}>
        <div style={{ fontSize:12,letterSpacing:4,color:C.textMuted,fontWeight:700 }}>MATRIX COMMAND CENTER</div>
        <h1 style={{ fontSize:'clamp(26px,5vw,44px)',fontWeight:800,margin:'10px 0 4px',letterSpacing:-.5,
          background:'linear-gradient(90deg,#ff5a5a,#fff 50%,#22d36b)',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent' }}>Choose Your Character</h1>
        <p style={{ color:C.textDim,fontSize:14 }}>Who's at the controls?</p>
      </div>
      <div style={{ display:'flex',gap:24,flexWrap:'wrap',justifyContent:'center' }}>
        {chars.map(c=>{ const on=hov===c.id;
          return (
          <button key={c.id} onClick={()=>chooseCharacter(c.id)}
            onMouseEnter={()=>setHov(c.id)} onMouseLeave={()=>setHov(null)}
            style={{ width:262,padding:'30px 24px',borderRadius:20,cursor:'pointer',textAlign:'center',
              background:C.bg2,border:`1px solid ${c.color}${on?'aa':'55'}`,
              boxShadow:on?`0 0 0 1px ${c.color}55, 0 22px 60px ${c.glow}`:`0 0 0 1px ${c.color}22, 0 18px 50px rgba(0,0,0,.5)`,
              transform:on?'translateY(-6px)':'none',transition:'transform .16s, box-shadow .16s, border-color .16s' }}>
            <div style={{ fontSize:11,letterSpacing:2,fontWeight:800,color:c.color,marginBottom:18 }}>{c.tag}</div>
            <div style={{ position:'relative',width:96,height:96,margin:'0 auto 18px' }}>
              <div style={{ position:'absolute',inset:-6,borderRadius:'50%',background:`radial-gradient(circle, ${c.glow}, transparent 70%)`,
                filter:'blur(6px)',opacity:on?1:.7,transition:'opacity .16s' }}/>
              <div style={{ position:'relative' }}><Avatar id={c.id} size={96} ring/></div>
            </div>
            <div style={{ width:90,height:6,margin:'0 auto 18px',borderRadius:4,background:c.color,
              boxShadow:`0 0 16px ${c.color}, 0 0 4px #fff` }}/>
            <div style={{ fontSize:22,fontWeight:800,color:C.text }}>{c.title}</div>
            <div style={{ fontSize:12.5,color:C.textDim,marginTop:4 }}>{c.sub}</div>
          </button>
        ); })}
      </div>
      <p style={{ marginTop:30,fontSize:12,color:C.textMuted }}>You can switch anytime from the top bar.</p>
    </div>
  );
}

function Brief(){
  const { brief, setBrief } = useApp();
  if(!brief) return null;
  const { dueBy, added, completed, requests, detailsToday, firstRun } = brief;
  const close=()=>setBrief(null);

  const Line=({t})=>(
    <div style={{ display:'flex',alignItems:'center',gap:9,padding:'5px 0' }}>
      <Avatar id={t.assignedTo||'habib'} size={20}/>
      <span style={{ fontSize:13,color:C.text,flex:1,minWidth:0 }} className="clamp1">{t.title}</span>
    </div>
  );
  const Section=({icon,color,title,children})=>(
    <div style={{ marginBottom:16 }}>
      <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:8 }}>
        <span style={{ width:26,height:26,borderRadius:8,background:color+'22',display:'grid',placeItems:'center' }}>
          <Icon name={icon} size={15} color={color}/></span>
        <span style={{ fontSize:12,fontWeight:800,letterSpacing:.4,textTransform:'uppercase',color:C.textDim }}>{title}</span>
      </div>
      {children}
    </div>
  );
  const PersonDue=({id})=>{
    const list=dueBy[id]||[];
    return (
      <div style={{ marginBottom:8 }}>
        <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:2 }}>
          <Avatar id={id} size={22}/>
          <span style={{ fontSize:13.5,fontWeight:700,color:teamById(id).color }}>{teamById(id).name}</span>
          <span style={{ fontSize:12,color:C.textMuted }}>{list.length?list.length+' due':'nothing due'}</span>
        </div>
        {list.map(t=><Line key={t.id} t={t}/>)}
      </div>
    );
  };
  const noChanges = !added.length && !completed.length && !requests.length;

  return (
    <Modal open={true} onClose={close} title="Daily Brief" width={560}
      footer={<Btn onClick={close}>Got it</Btn>}>
      <div style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 16px',marginBottom:18,
        background:C.cyanDim,border:`1px solid ${C.border}`,borderRadius:14 }}>
        <span style={{ fontSize:34,fontWeight:800,color:C.cyanBright,lineHeight:1 }}>{detailsToday.length}</span>
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:14,fontWeight:700,color:C.text }}>{detailsToday.length===1?'detail':'details'} on the calendar today</div>
          <div style={{ fontSize:12,color:C.textDim }} className="clamp1">{detailsToday.length
            ? detailsToday.slice(0,4).map(a=>a.time+' '+a.customer).join(' · ')+(detailsToday.length>4?' …':'')
            : 'No jobs booked for today yet'}</div>
        </div>
      </div>

      <Section icon="check" color={C.cyan} title="Due today">
        <PersonDue id="habib"/>
        <PersonDue id="partner"/>
        {(dueBy.both||[]).length>0 && <PersonDue id="both"/>}
      </Section>

      <Section icon="bell" color={C.gold} title="Since you last checked">
        {firstRun && <p style={{ fontSize:12.5,color:C.textMuted }}>First time opening the brief - tracking changes from here on.</p>}
        {!firstRun && noChanges && <p style={{ fontSize:12.5,color:C.textMuted }}>No changes since your last visit.</p>}
        {completed.length>0 && <>
          <div style={{ fontSize:12,fontWeight:700,color:C.green,margin:'6px 0 2px' }}>Completed ({completed.length})</div>
          {completed.map(t=><Line key={t.id} t={t}/>)}
        </>}
        {added.length>0 && <>
          <div style={{ fontSize:12,fontWeight:700,color:C.cyan,margin:'8px 0 2px' }}>Added ({added.length})</div>
          {added.map(t=><Line key={t.id} t={t}/>)}
        </>}
        {requests.length>0 && <>
          <div style={{ fontSize:12,fontWeight:700,color:C.gold,margin:'8px 0 2px' }}>Requests ({requests.length})</div>
          {requests.map(t=>(
            <div key={t.id} style={{ display:'flex',alignItems:'center',gap:9,padding:'5px 0' }}>
              <Avatar id={t.request.to} size={20}/>
              <span style={{ fontSize:13,color:C.text,flex:1,minWidth:0 }} className="clamp1">{t.title}</span>
              <span style={{ fontSize:11,color:C.textMuted,whiteSpace:'nowrap' }}>{teamById(t.request.from).name} -&gt; {teamById(t.request.to).name}</span>
            </div>
          ))}
        </>}
      </Section>
    </Modal>
  );
}

function Shell(){
  const { page } = useApp();
  const Page=PAGES[page]||Dashboard;
  return (
    <>
      <Sidebar/>
      <main style={{ flex:1,display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',minWidth:0 }}>
        <Topbar/>
        <Page/>
      </main>
      <MobileNav/>
      <Brief/>
      <Toasts/>
      <CharacterSelect/>
    </>
  );
}

function App(){
  return <AppProvider><Shell/></AppProvider>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
