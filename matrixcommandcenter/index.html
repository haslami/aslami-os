<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

/* ============================================================
   DESIGN TOKENS

const TEAM = [
  { id:'habib',   name:'Habib', role:'Owner', color:'#1fc56a', initials:'H' },
  { id:'partner', name:'Ryan',  role:'Owner', color:'#e0b73c', initials:'R' },
];

const teamById = id => id==='both' ? BOTH : (TEAM.find(t=>t.id===id) || { name:'Unassigned', color:'#8aa395', initials:'?' });
/* assignee chips/options: each partner plus a shared "Both" */
const ASSIGNEES = [...TEAM, BOTH];

const PRIORITY = { high:{label:'High',color:'#ff5a5a'}, medium:{label:'Medium',color:'#e0b73c'}, low:{label:'Low',color:'#8aa395'} };
const PRIO_RANK = { high:0, medium:1, low:2 };
const TASK_COLS = [
  { id:'not-started', label:'Not Started', color:'#8aa395' },
  { id:'in-progress', label:'In Progress', color:'#1fc56a' },
  { id:'waiting',     label:'Waiting',     color:'#e0b73c' },
  { id:'completed',   label:'Completed',   color:'#22d36b' },
];
const TASK_SORTS = [
  { id:'priority', label:'Priority' },
  { id:'due',      label:'Due date' },
  { id:'created',  label:'Date added' },
  { id:'title',    label:'Title A-Z' },
];
function sortTasks(list, key){
  const a=[...list];
  if(key==='due')       a.sort((x,y)=>(x.due||'9999-99-99').localeCompare(y.due||'9999-99-99') || (PRIO_RANK[x.priority]-PRIO_RANK[y.priority]));
  else if(key==='created') a.sort((x,y)=>(y.created||0)-(x.created||0));
  else if(key==='title')   a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  else /* priority */      a.sort((x,y)=>(PRIO_RANK[x.priority]-PRIO_RANK[y.priority]) || (x.due||'9999-99-99').localeCompare(y.due||'9999-99-99'));
  return a;
}

const NAV = [
  { id:'dashboard',     label:'Command Center', icon:'home' },
  { id:'schedule',      label:'Schedule',       icon:'calendar' },
  { id:'tasks',         label:'Tasks',          icon:'check' },
  { id:'ideas',         label:'Ideas',          icon:'bulb' },
  { id:'finance',       label:'Finance',        icon:'chart' },
  { id:'goals',         label:'Goals',          icon:'target' },
  { id:'team',          label:'Team',           icon:'message' },
  { id:'reports',       label:'Reports',        icon:'file' },
  { id:'notifications', label:'Notifications',  icon:'bell' },
];

/* ============================================================
   UTILITIES
   ============================================================ */
const fmt$ = n => '$'+Math.round(n).toLocaleString();
const fmt$k = n => n>=1000 ? '$'+(n/1000).toFixed(n>=10000?0:1)+'k' : '$'+n;
const pct = (a,b) => b? Math.round((a/b)*100) : 0;
const todayISO = () => new Date().toISOString().slice(0,10);
const iso = d => d.toISOString().slice(0,10);
const pad2 = n => String(n).padStart(2,'0');
const uid = () => Math.random().toString(36).slice(2,10);

function fmtDate(isoStr, opt){
  const d = new Date(isoStr+'T00:00:00');
  return d.toLocaleDateString('en-US', opt || { month:'short', day:'numeric' });
}
/* Urgency metadata for a task due date. level: overdue | today | soon | none */
function dueMeta(isoStr, status){
  if(status==='completed') return { label:fmtDate(isoStr), color:'#8aa395', level:'none' };
  const diff = Math.round((new Date(isoStr+'T00:00:00') - new Date(TODAY+'T00:00:00'))/86400000);
  if(diff < 0)  return { label:(-diff)+(diff===-1?' day overdue':' days overdue'), color:'#ff5a5a', level:'overdue' };
  if(diff===0)  return { label:'Due today',    color:'#d98a2b', level:'today' };
  if(diff===1)  return { label:'Due tomorrow', color:'#e0b73c', level:'soon' };
  if(diff<=3)   return { label:'Due in '+diff+' days', color:'#e0b73c', level:'soon' };
  return { label:fmtDate(isoStr), color:'#8aa395', level:'none' };
}
function relTime(ts){
  const diff = (Date.now()-ts)/1000;
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
function fmtTime(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  const ap = h>=12?'PM':'AM'; const hr = h%12||12;
  return hr+':'+pad2(m)+' '+ap;
}
function addDays(isoStr, n){ const d=new Date(isoStr+'T00:00:00'); d.setDate(d.getDate()+n); return localISO(d); }
function startOfWeek(d){ const x=new Date(d); x.setDate(x.getDate()-x.getDay()); x.setHours(0,0,0,0); return x; }
function localISO(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }

const NOW = new Date();
const TODAY = localISO(NOW);

/* ============================================================
   GOHIGHLEVEL  — live data layer (no seed / no mock numbers)
   ============================================================ */
const GHL_LOC='4oujU1ql0szJ60pb1xzk';
const GHL_CAL='sA5qta4JYh961np0ienC';
const GHL_USER='v1rBWcBX8nB2a3RwvpzR';
const GHL_PROXY='/.netlify/functions/ghl';

/* ============================================================
   SUPABASE  — shared sync for tasks + goals (Habib <-> Ryan)
   Dedicated Matrix project; completely separate from JARVIS.
   Paste the NEW project's URL + publishable key below.
   ============================================================ */
const SUPA_URL = 'https://errcepsgqvdzdmzckfbd.supabase.co';
const SUPA_KEY = 'sb_publishable_IdqYlW-JnuMJptfrZMHGEA_oXhmC1D5';   /* publishable (anon) key — browser-safe under RLS */
const SUPA_TABLE = 'matrix';
const SUPA_ROW = 'workspace';
const supa = (SUPA_URL && SUPA_KEY && window.supabase)
  ? window.supabase.createClient(SUPA_URL, SUPA_KEY)
  : null;

/* GHL custom-field IDs (discovered from live records) */
const CF_VEHICLE='MJaH6FI38stKWO0Q4z4k';
const CF_SERVICE='giKcGWgma7eU1SZmcAoH';

async function ghlGet(path, params){
  const url=new URL(GHL_PROXY, location.origin);
  url.searchParams.set('ghlpath', path);
  if(params) Object.entries(params).forEach(([k,v])=>{ if(v!=null) url.searchParams.set(k,String(v)); });
  const r=await fetch(url);
  if(!r.ok) throw new Error('GHL '+r.status+' '+path);
  return r.json();
}

/* classify a free-text service/title into a SERVICES key */
function classifyService(str){
  const s=(str||'').toLowerCase();
  if(/ceramic|coating/.test(s)) return 'ceramic';
  if(/correction|polish|buff/.test(s)) return 'correction';
  if(/premium/.test(s)) return 'premium';
  if(/deluxe/.test(s)) return 'deluxe';
  if(/exterior|wash/.test(s)) return 'exterior';
  if(/basic|interior|maintenance/.test(s)) return 'basic';
  if(/add[- ]?on/.test(s)) return 'addon';
  return 'other';
}
/* pull a "$1,200" style price out of free text; 0 if none */
function parsePrice(str){
  const m=(str||'').replace(/,/g,'').match(/\$\s?(\d+(?:\.\d+)?)/);
  return m?Math.round(+m[1]):0;
}
function cfVal(contact, id){
  const f=(contact&&contact.customFields||[]).find(x=>x.id===id);
  return f?(f.value||''):'';
}

/* map a GHL calendar event -> appointment shape the UI expects */
function mapEvent(ev, contactMap){
  const ct=contactMap[ev.contactId]||{};
  const start=ev.startTime?new Date(ev.startTime):null;
  const svcText=cfVal(ct,CF_SERVICE)||ev.title||'';
  const status=(ev.appointmentStatus||'').toLowerCase();
  return {
    id:ev.id||uid(),
    customer:ct.contactName||ct.firstName||(ev.title||'').replace(/\s*\$\d.*$/,'').trim()||'Customer',
    vehicle:cfVal(ct,CF_VEHICLE)||'',
    service:classifyService(svcText),
    price:parsePrice(ev.title)||parsePrice(ev.notes)||0,
    date:start?localISO(start):TODAY,
    time:start?pad2(start.getHours())+':'+pad2(start.getMinutes()):'09:00',
    address:ev.address||'',
    assignedTo:ev.assignedUserId||'',
    status:/cancel/.test(status)?'cancelled':/show|complete/.test(status)?'completed':'scheduled',
    notes:ev.notes||ev.description||'',
  };
}

/* map a GHL opportunity -> lead shape */
function mapOpportunity(op, stageMap){
  const st=(op.status||'').toLowerCase();
  let stage;
  if(st==='won') stage='won';
  else if(st==='lost'||st==='abandoned') stage='lost';
  else {
    const sn=(stageMap[op.pipelineStageId]||'').toLowerCase();
    stage=/quote|estimate/.test(sn)?'quoted':/warm|cold|contact/.test(sn)?'contacted':'new';
  }
  return {
    id:op.id||uid(),
    name:op.name||(op.contact&&op.contact.name)||'Lead',
    service:classifyService(op.name),
    value:Math.round(op.monetaryValue||0),
    stage,
    source:op.source||'',
    ts:Date.parse(op.createdAt||op.dateAdded||'')||Date.now(),
  };
}

/* live aggregates derived from real appointment prices */
function revDaily(appts){
  const out=[]; const base=new Date(NOW); base.setHours(0,0,0,0); base.setDate(base.getDate()-29);
  for(let i=0;i<30;i++){ const d=new Date(base); d.setDate(d.getDate()+i); const ds=localISO(d);
    out.push({ date:fmtDate(ds), full:ds, revenue:appts.filter(a=>a.date===ds&&a.status!=='cancelled').reduce((s,a)=>s+(a.price||0),0) }); }
  return out;
}
function revMonthly(appts){
  const out=[]; const now=new Date(NOW);
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth();
    const rev=appts.filter(a=>{ const ad=new Date(a.date+'T00:00:00'); return ad.getFullYear()===y&&ad.getMonth()===m&&a.status!=='cancelled'; })
      .reduce((s,a)=>s+(a.price||0),0);
    out.push({ month:d.toLocaleDateString('en-US',{month:'short'}), revenue:rev }); }
  return out;
}
function serviceBreakdown(appts){
  const map={};
  (appts||[]).filter(a=>a.status!=='cancelled').forEach(a=>{ const k=a.service||'other'; map[k]=(map[k]||0)+(a.price||0); });
  return Object.keys(map).filter(k=>map[k]>0).map(k=>({ name:(SERVICES[k]||SERVICES.other).label, key:k, value:map[k], color:(SERVICES[k]||SERVICES.other).color }));
}
function sumRange(appts,from,to){ return (appts||[]).filter(a=>a.date>=from&&a.date<=to&&a.status!=='cancelled').reduce((s,a)=>s+(a.price||0),0); }

/* orchestrate the live pull */
async function loadGHL(){
  const now=new Date(NOW);
  const winStart=new Date(now); winStart.setDate(winStart.getDate()-60);
  const winEnd=new Date(now); winEnd.setDate(winEnd.getDate()+60);

  const [eventsRes, oppRes, pipeRes, contactRes] = await Promise.all([
    ghlGet('/calendars/events',{ locationId:GHL_LOC, userId:GHL_USER, startTime:winStart.getTime(), endTime:winEnd.getTime() }).catch(()=>({events:[]})),
    ghlGet('/opportunities/search',{ location_id:GHL_LOC, limit:100 }).catch(()=>({opportunities:[]})),
    ghlGet('/opportunities/pipelines',{ locationId:GHL_LOC }).catch(()=>({pipelines:[]})),
    ghlGet('/contacts/',{ locationId:GHL_LOC, limit:100 }).catch(()=>({contacts:[]})),
  ]);

  const contactMap={};
  (contactRes.contacts||[]).forEach(c=>{ contactMap[c.id]=c; });
  const stageMap={};
  (pipeRes.pipelines||[]).forEach(p=>(p.stages||[]).forEach(s=>{ stageMap[s.id]=s.name; }));

  const appts=(eventsRes.events||[]).map(ev=>mapEvent(ev,contactMap));
  const leads=(oppRes.opportunities||[]).map(op=>mapOpportunity(op,stageMap));

  return { appts, leads, contactCount:(contactRes.meta&&contactRes.meta.total)||contactRes.contacts&&contactRes.contacts.length||0 };
}


/* ============================================================
   GLOBAL STATE
   ============================================================ */
const LS_PREFIX='mmd.';
function lsLoad(key, fallback){ try{ const v=localStorage.getItem(LS_PREFIX+key); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function lsSave(key, val){ try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); }catch(e){} }

const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function AppProvider({ children }){
  const [page, setPage] = useState('dashboard');
  const [user, setUser] = useState(()=>lsLoad('user','habib'));
  useEffect(()=>{ lsSave('user',user); },[user]);
  /* Live from GoHighLevel */
  const [appts, setAppts] = useState([]);
  const [leads, setLeads] = useState([]);
  const [contactCount, setContactCount] = useState(null);
  const [loading, setLoading] = useState(true);
  const [ghlError, setGhlError] = useState(null);
  const [lastSync, setLastSync] = useState(null);
  /* Local workspaces (user-managed; not numbers) */
  const [tasks, setTasks] = useState(()=>lsLoad('tasks',[]));
  const [ideas, setIdeas] = useState(()=>lsLoad('ideas',[]));
  const [goals, setGoals] = useState(()=>lsLoad('goals',[]));
  const [revenue2026, setRevenue2026] = useState(()=>lsLoad('revenue2026',null));
  const [notifs, setNotifs] = useState([]);
  const [messages, setMessages] = useState(()=>lsLoad('messages',[]));
  const [announce, setAnnounce] = useState(()=>lsLoad('announce',[]));
  const [toasts, setToasts] = useState([]);
  const [brief, setBrief] = useState(null);
  const [picked, setPicked] = useState(false);   /* has the user chosen their character this session */
  const briefShown = useRef(false);
  const apptsRef = useRef([]); apptsRef.current = appts;
  const userRef = useRef(user); userRef.current = user;

  useEffect(()=>{ lsSave('tasks',tasks); },[tasks]);
  useEffect(()=>{ lsSave('ideas',ideas); },[ideas]);
  useEffect(()=>{ lsSave('goals',goals); },[goals]);
  useEffect(()=>{ lsSave('revenue2026',revenue2026); },[revenue2026]);
  useEffect(()=>{ lsSave('messages',messages); },[messages]);
  useEffect(()=>{ lsSave('announce',announce); },[announce]);

  /* ---- Supabase shared sync: tasks + goals + messages + announce + revenue (last-write-wins) ---- */
  const remoteStamp = useRef(0);          /* updated_at of last applied remote */
  const pushTimer = useRef(null);
  /* JSON of the last state we either received from remote or pushed; used to
     skip echo writes without relying on fragile timing flags. */
  const lastSyncedRef = useRef(null);
  /* always-current snapshot of synced state, so applyRemote can merge against
     it (remote rows may omit some keys) without stale-closure values. */
  const stateRef = useRef({});
  stateRef.current = { tasks, ideas, goals, revenue2026, messages, announce };
  const serializeSync = (s)=>JSON.stringify({
    tasks:s.tasks, ideas:s.ideas, goals:s.goals, revenue2026:s.revenue2026, messages:s.messages, announce:s.announce,
  });

  const applyRemote = useCallback((row)=>{
    if(!row || !row.data) return;
    const stamp = row.updated_at ? new Date(row.updated_at).getTime() : 0;
    if(stamp && stamp <= remoteStamp.current) return;  /* not newer */
    remoteStamp.current = stamp;
    const d = row.data;
    const merged = { ...stateRef.current };
    if(Array.isArray(d.tasks)){ setTasks(d.tasks); merged.tasks = d.tasks; }
    if(Array.isArray(d.ideas)){ setIdeas(d.ideas); merged.ideas = d.ideas; }
    if(Array.isArray(d.goals)){ setGoals(d.goals); merged.goals = d.goals; }
    if(Array.isArray(d.messages)){ setMessages(d.messages); merged.messages = d.messages; }
    if(Array.isArray(d.announce)){ setAnnounce(d.announce); merged.announce = d.announce; }
    if(typeof d.revenue2026 !== 'undefined'){ setRevenue2026(d.revenue2026); merged.revenue2026 = d.revenue2026; }
    /* baseline = the state we just applied, so the push effect sees no diff and skips */
    lastSyncedRef.current = serializeSync(merged);
  },[]);

  const pullRemote = useCallback(async ()=>{
    if(!supa) return;
    try{
      const { data, error } = await supa
        .from(SUPA_TABLE).select('data,updated_at')
        .eq('id', SUPA_ROW).maybeSingle();
      if(!error && data) applyRemote(data);
    }catch(e){}
  },[applyRemote]);

  /* initial pull + realtime subscription + focus/interval refresh */
  useEffect(()=>{
    if(!supa) return;
    pullRemote();
    const channel = supa.channel('matrix-ws')
      .on('postgres_changes',
        { event:'*', schema:'public', table:SUPA_TABLE, filter:'id=eq.'+SUPA_ROW },
        (payload)=>{ if(payload.new) applyRemote(payload.new); })
      .subscribe();
    const onFocus=()=>pullRemote();
    window.addEventListener('focus', onFocus);
    const iv = setInterval(pullRemote, 20000);
    return ()=>{ supa.removeChannel(channel); window.removeEventListener('focus', onFocus); clearInterval(iv); };
  },[pullRemote]);

  /* debounced push whenever synced state changes locally */
  useEffect(()=>{
    if(!supa) return;
    const payload = serializeSync({ tasks, ideas, goals, revenue2026, messages, announce });
    /* first run: adopt current state as baseline, nothing to push yet */
    if(lastSyncedRef.current === null){ lastSyncedRef.current = payload; return; }
    /* unchanged vs last sync (incl. echoes of our own / remote writes): skip */
    if(payload === lastSyncedRef.current) return;
    if(pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async ()=>{
      const updated_at = new Date().toISOString();
      remoteStamp.current = new Date(updated_at).getTime();
      lastSyncedRef.current = payload;
      try{
        await supa.from(SUPA_TABLE).upsert({ id:SUPA_ROW, data:JSON.parse(payload), updated_at });
      }catch(e){}
    }, 800);
    return ()=>{ if(pushTimer.current) clearTimeout(pushTimer.current); };
  },[tasks, ideas, goals, revenue2026, messages, announce]);

  const toast = useCallback((msg, kind='success')=>{
    const id = uid();
    setToasts(t=>[...t,{ id, msg, kind }]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 3200);
  },[]);

  const sync = useCallback(async (announce)=>{
    setLoading(true);
    try{
      const d = await loadGHL();
      setAppts(d.appts);
      setLeads(d.leads);
      setContactCount(d.contactCount);
      setGhlError(null);
      setLastSync(new Date());
      if(announce) toast('Synced with GoHighLevel');
    }catch(e){
      setGhlError(e.message||'GoHighLevel connection failed');
      if(announce) toast('GoHighLevel sync failed','error');
    }finally{ setLoading(false); }
  },[toast]);

  useEffect(()=>{ sync(false); const t=setInterval(()=>sync(false),300000); return ()=>clearInterval(t); },[sync]);

  /* ---- Daily brief: one-shot startup summary (due today / recent changes / details today) ---- */
  const buildBrief = useCallback(()=>{
    const u = userRef.current;
    const ts = stateRef.current.tasks || [];
    const aps = apptsRef.current || [];
    const snapKey = 'briefSeen.'+u;
    const snap = lsLoad(snapKey, null);
    const prev = snap && snap.ids;                         /* {id:status} from last visit (this device+user) */
    const isNew  = id => prev && !(id in prev);
    const justDone = t => prev && t.status==='completed' && prev[t.id] && prev[t.id]!=='completed';

    const active = ts.filter(t=>!(t.request && t.request.status==='pending'));
    const due = active.filter(t=>t.due===TODAY && t.status!=='completed');
    const dueBy = {
      habib:   due.filter(t=>t.assignedTo==='habib'),
      partner: due.filter(t=>t.assignedTo==='partner'),
      both:    due.filter(t=>t.assignedTo==='both'),
    };
    const added     = prev ? ts.filter(t=>!t.request && isNew(t.id)) : [];
    const completed = prev ? ts.filter(t=>justDone(t)) : [];
    const requests  = prev ? ts.filter(t=>t.request && isNew(t.id)) : [];
    const detailsToday = aps.filter(a=>a.date===TODAY && a.status!=='cancelled')
                            .sort((a,b)=>(a.time||'').localeCompare(b.time||''));

    const ids={}; ts.forEach(t=>{ ids[t.id]=t.status; });
    lsSave(snapKey, { ts:Date.now(), ids });               /* consume: reopening won't re-report */

    return { dueBy, added, completed, requests, detailsToday, firstRun: !prev };
  },[]);

  useEffect(()=>{
    if(briefShown.current || loading || !picked) return;   /* wait for character pick + first GHL sync, fire once */
    briefShown.current = true;
    const t=setTimeout(()=>setBrief(buildBrief()), 700);   /* let the initial Supabase pull land */
    return ()=>clearTimeout(t);
  },[loading, picked, buildBrief]);

  const api = {
    page, setPage, user, setUser, toast, toasts, setToasts,
    appts, tasks, ideas, leads, goals, notifs, messages, announce,
    loading, ghlError, lastSync, contactCount, sync,
    revenue2026, setRevenue2026, brief, setBrief,
    picked, chooseCharacter:(id)=>{ setUser(id); setPicked(true); },

    addAppt:(a)=>{ setAppts(p=>[...p,{...a,id:uid()}]); toast('Appointment scheduled'); },
    updateAppt:(id,patch)=>setAppts(p=>p.map(a=>a.id===id?{...a,...patch}:a)),
    delAppt:(id)=>{ setAppts(p=>p.filter(a=>a.id!==id)); toast('Appointment removed','info'); },

    addTask:(t)=>{ setTasks(p=>[...p,{...t,id:uid(),created:Date.now(),comments:[]}]); toast('Task created'); },
    updateTask:(id,patch)=>setTasks(p=>p.map(t=>t.id===id?{...t,...patch}:t)),
    delTask:(id)=>{ setTasks(p=>p.filter(t=>t.id!==id)); toast('Task deleted','info'); },
    addComment:(id,text)=>setTasks(p=>p.map(t=>t.id===id?{...t,comments:[...t.comments,{by:user,text,ts:Date.now()}]}:t)),

    /* Task requests: send a task to the other partner to accept/decline */
    sendRequest:(t)=>{ const to=user==='habib'?'partner':'habib';
      setTasks(p=>[...p,{...t,id:uid(),created:Date.now(),comments:[],assignedTo:to,status:'not-started',request:{status:'pending',from:user,to}}]);
      toast('Request sent to '+teamById(to).name); },
    acceptRequest:(id)=>{ setTasks(p=>p.map(t=>t.id===id?{...t,request:null}:t)); toast('Request accepted'); },
    declineRequest:(id)=>setTasks(p=>p.map(t=>t.id===id?{...t,request:{...t.request,status:'declined'}}:t)),
    resendRequest:(id)=>setTasks(p=>p.map(t=>t.id===id?{...t,request:{...t.request,status:'pending'}}:t)),
    dismissRequest:(id)=>setTasks(p=>p.filter(t=>t.id!==id)),

    /* Ideas: brainstorm board, comment/build, promote to a task */
    addIdea:(i)=>{ setIdeas(p=>[{...i,id:uid(),by:user,created:Date.now(),comments:[]},...p]); toast('Idea posted'); },
    updateIdea:(id,patch)=>setIdeas(p=>p.map(i=>i.id===id?{...i,...patch}:i)),
    delIdea:(id)=>{ setIdeas(p=>p.filter(i=>i.id!==id)); toast('Idea removed','info'); },
    addIdeaComment:(id,text)=>setIdeas(p=>p.map(i=>i.id===id?{...i,comments:[...(i.comments||[]),{by:user,text,ts:Date.now()}]}:i)),
    promoteIdea:(id)=>{ const idea=ideas.find(i=>i.id===id); if(!idea)return;
      setTasks(tp=>[...tp,{ id:uid(),title:idea.title,desc:idea.desc||'',priority:'medium',due:TODAY,
        assignedTo:user,status:'not-started',created:Date.now(),comments:idea.comments||[] }]);
      setIdeas(p=>p.filter(i=>i.id!==id)); toast('Idea promoted to task'); setPage('tasks'); },

    addGoal:(g)=>{ setGoals(p=>[...p,{...g,id:uid()}]); toast('Goal added'); },
    updateGoal:(id,patch)=>setGoals(p=>p.map(g=>g.id===id?{...g,...patch}:g)),
    delGoal:(id)=>setGoals(p=>p.filter(g=>g.id!==id)),

    markNotif:(id)=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n)),
    markAllNotifs:()=>{ setNotifs(p=>p.map(n=>({...n,read:true}))); toast('All marked read'); },
    clearNotifs:()=>{ setNotifs([]); toast('Notifications cleared','info'); },

    sendMessage:(text)=>setMessages(p=>[...p,{id:uid(),by:user,text,ts:Date.now()}]),
    addAnnounce:(title,text)=>{ setAnnounce(p=>[{id:uid(),by:user,title,text,ts:Date.now(),pinned:false},...p]); toast('Announcement posted'); },

    advanceLead:(id)=>setLeads(p=>p.map(l=>{
      const order=['new','contacted','quoted','won']; const i=order.indexOf(l.stage);
      return l.id===id && i<order.length-1 ? {...l,stage:order[i+1]} : l;
    })),
  };

  return <AppCtx.Provider value={api}>{children}</AppCtx.Provider>;
}

/* ============================================================
   UI PRIMITIVES
   ============================================================ */
function Card({ children, style, pad=20, className='', onClick, hover }){
  const [h,setH]=useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>setH(false)}
      className={className}
      style={{
        background:C.panel, border:`1px solid ${h?C.borderHi:C.border}`,
        borderRadius:16, padding:pad, backdropFilter:'blur(8px)',
        boxShadow:h?'0 12px 40px rgba(0,0,0,.4)':'0 4px 20px rgba(0,0,0,.25)',
        transition:'border-color .2s, box-shadow .2s, transform .2s',
        cursor:onClick?'pointer':'default', transform:h&&onClick?'translateY(-2px)':'none',
        ...style }}>
      {children}
    </div>
  );
}

function Btn({ children, onClick, variant='primary', size='md', icon, style, type='button', disabled }){
  const [h,setH]=useState(false);
  const sizes={ sm:{padding:'7px 12px',fontSize:13}, md:{padding:'10px 16px',fontSize:14}, lg:{padding:'13px 22px',fontSize:15} };
  const variants={
    primary:{ background:h?'linear-gradient(135deg,#2fe07e,#ecc24a)':'linear-gradient(135deg,#1fc56a,#e0b73c)', color:'#06090c', boxShadow:h?'0 6px 22px rgba(31,197,106,.4)':'0 2px 12px rgba(31,197,106,.25)' },
    ghost:{ background:h?C.cyanDim:'transparent', color:C.cyan, border:`1px solid ${h?C.borderHi:C.border}` },
    soft:{ background:h?'rgba(31,197,106,0.16)':C.cyanDim, color:C.cyanBright },
    danger:{ background:h?'rgba(255,77,77,0.2)':C.redDim, color:C.red, border:`1px solid rgba(255,77,77,0.25)` },
    dark:{ background:h?C.bg3:C.bg2, color:C.text, border:`1px solid ${C.border}` },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{ display:'inline-flex',alignItems:'center',gap:7,justifyContent:'center',
        borderRadius:10,fontWeight:600,letterSpacing:.3,transition:'all .18s',
        opacity:disabled?.5:1, pointerEvents:disabled?'none':'auto',
        ...sizes[size], ...variants[variant], ...style }}>
      {icon && <Icon name={icon} size={size==='sm'?15:17} />}
      {children}
    </button>
  );
}

function Badge({ children, color=C.cyan, solid }){
  return (
    <span style={{ display:'inline-flex',alignItems:'center',gap:5,
      padding:'3px 10px',borderRadius:20,fontSize:11.5,fontWeight:700,letterSpacing:.4,
      color:solid?'#04101c':color, background:solid?color:`${color}22`,
      border:`1px solid ${color}44` }}>
      {children}
    </span>
  );
}

function Avatar({ id, size=34, ring }){
  if(id==='both'){
    const a=teamById('habib'), b=teamById('partner'), c=size*0.7;
    const cell=(m,left,z)=>(
      <span style={{ position:'absolute',left,top:(size-c)/2,width:c,height:c,borderRadius:'50%',
        display:'flex',alignItems:'center',justifyContent:'center',background:`${m.color}26`,color:m.color,
        fontWeight:700,fontSize:c*0.42,border:`2px solid ${C.bg2}`,zIndex:z,letterSpacing:.3 }}>{m.initials}</span>);
    return (
      <span title="Both — Habib & Ryan" style={{ position:'relative',display:'inline-block',width:size+c*0.55,height:size,flex:'0 0 auto',verticalAlign:'middle' }}>
        {cell(a,0,1)}{cell(b,c*0.55,2)}
      </span>

  }
  const m = teamById(id);
  return (
    <div style={{ width:size,height:size,borderRadius:'50%',flex:'0 0 auto',
      display:'flex',alignItems:'center',justifyContent:'center',
      background:`${m.color}22`, color:m.color, fontWeight:700, fontSize:size*0.4,
      border:`2px solid ${ring?m.color:m.color+'55'}`, letterSpacing:.5 }}>
      {m.initials}
    </div>
  );
}

function Ring({ value, size=66, stroke=6, color=C.cyan, label }){
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(Math.min(value,100)/100)*circ;
  return (
    <div style={{ position:'relative', width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.bg3} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{ transition:'stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)' }}/>
      </svg>
      <div style={{ position:'absolute',inset:0,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center' }}>
        <span style={{ fontSize:size*0.26, fontWeight:800, color }}>{value}%</span>
        {label && <span style={{ fontSize:9, color:C.textDim }}>{label}</span>}
      </div>
    </div>
  );
}

function ProgressBar({ value, max, color=C.cyan, height=8, showPct }){
  const p = Math.min(pct(value,max),100);
  return (
    <div style={{ display:'flex',alignItems:'center',gap:10 }}>
      <div style={{ flex:1,height,background:C.bg3,borderRadius:height,overflow:'hidden' }}>
        <div style={{ width:p+'%',height:'100%',borderRadius:height,
          background:`linear-gradient(90deg,${color},${color}aa)`,
          boxShadow:`0 0 10px ${color}66`, transition:'width 1s cubic-bezier(.2,.8,.2,1)',
          animation:'growBar 1s ease' }}/>
      </div>
      {showPct && <span style={{ fontSize:12,fontWeight:700,color,minWidth:34,textAlign:'right' }}>{p}%</span>}
    </div>
  );
}

function Modal({ open, onClose, title, children, width=520, footer }){
  useEffect(()=>{
    if(!open) return;
    const h=e=>e.key==='Escape'&&onClose();
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[open,onClose]);
  if(!open) return null;
  return (
    <div onClick={onClose} className="fade-in-fast" style={{ position:'fixed',inset:0,zIndex:200,
      background:'rgba(2,4,3,0.72)',backdropFilter:'blur(4px)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:16 }}>
      <div onClick={e=>e.stopPropagation()} className="scale-in" style={{ width:'100%',maxWidth:width,
        maxHeight:'90vh',display:'flex',flexDirection:'column',
        background:C.bg2,border:`1px solid ${C.borderHi}`,borderRadius:18,
        boxShadow:'0 30px 80px rgba(0,0,0,.6)' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'18px 22px',borderBottom:`1px solid ${C.border}` }}>
          <h3 style={{ fontSize:17,fontWeight:700,color:C.text }}>{title}</h3>
          <button onClick={onClose} style={{ width:32,height:32,borderRadius:8,display:'grid',
            placeItems:'center',color:C.textDim }}><Icon name="x" size={18}/></button>
        </div>
        <div style={{ padding:22, overflowY:'auto' }}>{children}</div>
        {footer && <div style={{ padding:'16px 22px',borderTop:`1px solid ${C.border}`,

function ApptModal({ open, onClose, initial, dateHint }){
  const { addAppt, updateAppt, delAppt } = useApp();
  const blank={ customer:'',vehicle:'',service:'basic',price:SERVICES.basic.price,date:dateHint||TODAY,time:'09:00',address:'',assignedTo:'habib',status:'scheduled',notes:'' };
  const [f,setF]=useState(initial||blank);
  useEffect(()=>{ setF(initial||{...blank,date:dateHint||TODAY}); },[initial,dateHint,open]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{ if(!f.customer){return;} initial?updateAppt(initial.id,f):addAppt(f); onClose(); };
  return (
    <Modal open={open} onClose={onClose} title={initial?'Edit Appointment':'New Appointment'}
      footer={<>
        {initial && <Btn variant="danger" icon="trash" onClick={()=>{delAppt(initial.id);onClose();}} style={{ marginRight:'auto' }}>Delete</Btn>}
        <Btn variant="dark" onClick={onClose}>Cancel</Btn>
        <Btn onClick={save}>{initial?'Save':'Schedule'}</Btn>
      </>}>
      <Field label="Customer"><input value={f.customer} onChange={e=>set('customer',e.target.value)} placeholder="Customer name"/></Field>
      <Field label="Vehicle"><input value={f.vehicle} onChange={e=>set('vehicle',e.target.value)} placeholder="2022 BMW M3"/></Field>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
        <Field label="Service">
          <select value={f.service} onChange={e=>{const s=e.target.value;set('service',s);set('price',SERVICES[s].price);}}>
            {Object.entries(SERVICES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </Field>
        <Field label="Price"><input type="number" value={f.price} onChange={e=>set('price',+e.target.value)}/></Field>
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
        <Field label="Date"><input type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></Field>
        <Field label="Time"><input type="time" value={f.time} onChange={e=>set('time',e.target.value)}/></Field>
      </div>
      <Field label="Address"><input value={f.address} onChange={e=>set('address',e.target.value)} placeholder="Service address"/></Field>
      <Field label="Assigned To">

    </Modal>
  );
}

function MonthView({ cursor, appts, onDay, onAppt }){
  const y=cursor.getFullYear(), m=cursor.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<42;i++){ const dn=i-first+1;
    if(dn>0&&dn<=days){ const ds=`${y}-${pad2(m+1)}-${pad2(dn)}`;
      cells.push({ dn, ds, list:appts.filter(a=>a.date===ds).sort((a,b)=>a.time.localeCompare(b.time)) }); }
    else cells.push({ dn:null }); }
  return (
    <Card pad={0} style={{ overflow:'hidden' }}>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(7,1fr)' }}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>(
          <div key={d} style={{ padding:'10px 0',textAlign:'center',fontSize:11.5,fontWeight:700,
            color:C.textDim,letterSpacing:.5,borderBottom:`1px solid ${C.border}` }}>{d}</div>
        ))}
        {cells.map((c,i)=>{
          const isToday=c.ds===TODAY;
          return (
            <div key={i} onClick={()=>c.dn&&onDay(c.ds)} style={{ minHeight:104,padding:6,
              borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,
              background:isToday?'rgba(31,197,106,0.07)':'transparent',cursor:c.dn?'pointer':'default',
              transition:'background .15s' }}
              onMouseEnter={e=>c.dn&&(e.currentTarget.style.background='rgba(31,197,106,0.1)')}
              onMouseLeave={e=>e.currentTarget.style.background=isToday?'rgba(31,197,106,0.07)':'transparent'}>
              {c.dn && (
                <>
                  <div style={{ fontSize:12.5,fontWeight:isToday?800:600,color:isToday?C.cyan:C.textDim,
                    marginBottom:4,display:'flex',alignItems:'center',gap:5 }}>
                    {isToday && <span style={{ width:6,height:6,borderRadius:'50%',background:C.cyan }}/>}{c.dn}
                  </div>
                  <div style={{ display:'flex',flexDirection:'column',gap:3 }}>
                    {c.list.slice(0,3).map(a=>(
                      <div key={a.id} onClick={e=>{e.stopPropagation();onAppt(a);}}
                        style={{ fontSize:10.5,padding:'2px 6px',borderRadius:5,
                        background:`${SERVICES[a.service].color}22`,color:SERVICES[a.service].color,
                        borderLeft:`2px solid ${SERVICES[a.service].color}`,fontWeight:600,
                        whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>
                        {fmtTime(a.time).replace(':00','')} {a.customer.split(' ')[0]}
                      </div>
                    ))}
                    {c.list.length>3 && <div style={{ fontSize:10,color:C.textDim,paddingLeft:6 }}>+{c.list.length-3} more</div>}
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function WeekView({ cursor, appts, onAppt, onSlot }){
  const start=startOfWeek(cursor);
  const days=[...Array(7)].map((_,i)=>{ const d=new Date(start); d.setDate(d.getDate()+i); return d; });
  const hours=[...Array(11)].map((_,i)=>i+7); // 7am - 5pm
  return (
    <Card pad={0} style={{ overflow:'auto' }}>
      <div style={{ display:'grid',gridTemplateColumns:'56px repeat(7,1fr)',minWidth:760 }}>
        <div style={{ borderBottom:`1px solid ${C.border}` }}/>
        {days.map((d,i)=>{ const isT=iso(d)===TODAY;
          return <div key={i} style={{ padding:'10px 4px',textAlign:'center',borderBottom:`1px solid ${C.border}`,borderLeft:`1px solid ${C.border}` }}>
            <div style={{ fontSize:11,color:C.textDim }}>{d.toLocaleDateString('en-US',{weekday:'short'})}</div>
            <div style={{ fontSize:16,fontWeight:isT?800:600,color:isT?C.cyan:C.text }}>{d.getDate()}</div>
          </div>; })}
        {hours.map(h=>(
          <React.Fragment key={h}>
            <div style={{ fontSize:10.5,color:C.textMuted,textAlign:'right',paddingRight:6,paddingTop:4,borderBottom:`1px solid ${C.border}`,height:58 }}>{fmtTime(pad2(h)+':00').replace(':00','')}</div>
            {days.map((d,di)=>{ const ds=iso(d);
              const slot=appts.filter(a=>a.date===ds && +a.time.split(':')[0]===h);
              return <div key={di} onClick={()=>onSlot(ds)} style={{ borderLeft:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:2,cursor:'pointer',position:'relative' }}>
                {slot.map(a=>(
                  <div key={a.id} onClick={e=>{e.stopPropagation();onAppt(a);}}
                    style={{ fontSize:10,padding:'3px 5px',borderRadius:5,marginBottom:2,
                    background:`${SERVICES[a.service].color}26`,color:SERVICES[a.service].color,
                    borderLeft:`2px solid ${SERVICES[a.service].color}`,fontWeight:600,overflow:'hidden' }}>
                    {a.customer.split(' ')[0]} · {fmt$(a.price)}
                  </div>
                ))}
              </div>; })}
          </React.Fragment>
        ))}
      </div>
    </Card>
  );
}

function DayView({ cursor, appts, onAppt, onSlot }){
  const ds=iso(cursor);
  const list=appts.filter(a=>a.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  const hours=[...Array(12)].map((_,i)=>i+7);
  return (
    <Card pad={0} style={{ overflow:'hidden' }}>
      {hours.map(h=>{ const slot=list.filter(a=>+a.time.split(':')[0]===h);
        return (
          <div key={h} onClick={()=>onSlot(ds)} style={{ display:'flex',borderBottom:`1px solid ${C.border}`,minHeight:62,cursor:'pointer' }}>
            <div style={{ width:72,padding:'8px 12px',fontSize:12,color:C.textMuted,textAlign:'right',borderRight:`1px solid ${C.border}` }}>{fmtTime(pad2(h)+':00').replace(':00','')}</div>
            <div style={{ flex:1,padding:6,display:'flex',gap:8,flexWrap:'wrap' }}>
              {slot.map(a=>{ const s=SERVICES[a.service];
                return <div key={a.id} onClick={e=>{e.stopPropagation();onAppt(a);}}
                  style={{ flex:1,minWidth:200,padding:'10px 14px',borderRadius:10,background:`${s.color}1a`,
                  borderLeft:`3px solid ${s.color}`,display:'flex',alignItems:'center',gap:12 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14,fontWeight:700 }}>{a.customer} <span style={{ color:s.color }}>· {s.label}</span></div>
                    <div style={{ fontSize:12,color:C.textDim }}>{a.vehicle} · {a.address}</div>
                  </div>
                  <div style={{ fontSize:15,fontWeight:800,color:C.green }}>{fmt$(a.price)}</div>
                  <Avatar id={a.assignedTo} size={30}/>
                </div>; })}
            </div>
          </div>
        ); })}
    </Card>
  );
}

/* ============================================================
   TASKS
   ============================================================ */
function TaskModal({ open, onClose, initial, asRequest }){
  const { addTask, updateTask, delTask, addComment, sendRequest, user } = useApp();
  const other = teamById(user==='habib'?'partner':'habib');
  const blank={ title:'',desc:'',priority:'medium',due:TODAY,assignedTo:user,status:'not-started' };
  const [f,setF]=useState(initial||blank);
  const [cm,setCm]=useState('');
  useEffect(()=>{ setF(initial||blank); setCm(''); },[initial,open]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  /* You can only assign to yourself or Both — to hand a task to your partner, send a request. */
  const assignOpts=[teamById(user),BOTH];
  if(f.assignedTo && !assignOpts.some(o=>o.id===f.assignedTo)) assignOpts.unshift(teamById(f.assignedTo));
  const save=()=>{ if(!f.title)return;
    if(asRequest){ sendRequest({ title:f.title,desc:f.desc,priority:f.priority,due:f.due }); }
    else if(initial){ updateTask(initial.id,f); }
    else { addTask(f); }
    onClose(); };
  return (
    <Modal open={open} onClose={onClose} title={asRequest?'Send Task Request':initial?'Task Details':'New Task'} width={560}
      footer={<>
        {initial && !asRequest && <Btn variant="danger" icon="trash" onClick={()=>{delTask(initial.id);onClose();}} style={{ marginRight:'auto' }}>Delete</Btn>}
        <Btn variant="dark" onClick={onClose}>Cancel</Btn>
        <Btn icon={asRequest?'send':undefined} onClick={save}>{asRequest?('Send to '+other.name):initial?'Save':'Create'}</Btn>
      </>}>
      {asRequest && (
        <div style={{ display:'flex',alignItems:'center',gap:10,background:`${other.color}14`,border:`1px solid ${other.color}40`,
          borderRadius:10,padding:'10px 12px',marginBottom:14 }}>
          <Avatar id={other.id} size={28}/>
          <div style={{ fontSize:13 }}><span style={{ color:C.textDim }}>Requesting </span>
            <span style={{ fontWeight:700,color:other.color }}>{other.name}</span>
            <span style={{ color:C.textDim }}> to take this on — they can accept or decline.</span></div>
        </div>
      )}
      <Field label="Title"><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="What needs doing?"/></Field>
      <Field label="Description"><textarea rows={2} value={f.desc} onChange={e=>set('desc',e.target.value)} placeholder="Details..."/></Field>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
        <Field label="Priority">
          <select value={f.priority} onChange={e=>set('priority',e.target.value)}>
            {Object.entries(PRIORITY).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </Field>
        {!asRequest && (
        <Field label="Status">
          <select value={f.status} onChange={e=>set('status',e.target.value)}>
            {TASK_COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </Field>
        )}
      </div>
      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
        <Field label="Due Date"><input type="date" value={f.due} onChange={e=>set('due',e.target.value)}/></Field>
        {!asRequest && (
        <Field label="Assigned To">
          <select value={f.assignedTo} onChange={e=>set('assignedTo',e.target.value)}>
            {assignOpts.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <p style={{ fontSize:11,color:C.textMuted,marginTop:5 }}>To give it to {other.name}, send a task request instead.</p>
        </Field>
        )}
      </div>
      {initial && (
        <div style={{ marginTop:8 }}>
          <label>Comments</label>
          <div style={{ display:'flex',flexDirection:'column',gap:8,marginBottom:10 }}>
            {initial.comments.map((c,i)=>(
              <div key={i} style={{ display:'flex',gap:8,alignItems:'flex-start' }}>
                <Avatar id={c.by} size={26}/>
                <div style={{ background:C.bg3,borderRadius:9,padding:'7px 11px',fontSize:13,flex:1 }}>
                  <span style={{ fontWeight:700,color:teamById(c.by).color }}>{teamById(c.by).name}</span>
                  <span style={{ color:C.textMuted,fontSize:11,marginLeft:6 }}>{relTime(c.ts)}</span>
                  <div style={{ marginTop:2 }}>{c.text}</div>
                </div>
              </div>
            ))}
            {!initial.comments.length && <p style={{ fontSize:12,color:C.textMuted }}>No comments yet.</p>}
          </div>
          <div style={{ display:'flex',gap:8 }}>
            <input value={cm} onChange={e=>setCm(e.target.value)} placeholder="Add a comment..." onKeyDown={e=>{if(e.key==='Enter'&&cm.trim()){addComment(initial.id,cm.trim());setCm('');}}}/>
            <Btn variant="soft" onClick={()=>{if(cm.trim()){addComment(initial.id,cm.trim());setCm('');}}}>Post</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* Urgency pill for a task's due date. Plain text when not urgent, colored pill otherwise. */
function DueChip({ due, status }){
  const d = dueMeta(due, status);
  if(d.level==='none')
    return <span style={{ fontSize:11.5,color:C.textDim,display:'inline-flex',alignItems:'center',gap:4 }}>
      <Icon name="clock" size={12} color={C.textDim}/>{d.label}</span>;
  return <span className={d.level==='overdue'?'pulse-soft':''}
    style={{ fontSize:11,fontWeight:800,letterSpacing:.2,color:d.color,background:`${d.color}1f`,
      border:`1px solid ${d.color}66`,borderRadius:20,padding:'3px 9px',display:'inline-flex',alignItems:'center',gap:4 }}>
    <Icon name={d.level==='overdue'?'alert':'clock'} size={12} color={d.color}/>{d.label}</span>;
}

function TaskCard({ task, onClick, onDragStart, onDragEnd, dragging }){
  const p=PRIORITY[task.priority];
  const active=task.status!=='completed';
  const high=task.priority==='high' && active;
  const urgent=dueMeta(task.due,task.status).level==='overdue';
  const flag=high||urgent;   /* needs attention */
  return (
    <div draggable onClick={onClick}
      onDragStart={e=>onDragStart(e,task.id)} onDragEnd={onDragEnd}
      className={urgent?'glow-red':''}
      style={{ background: flag?`linear-gradient(135deg, ${C.red}16, ${C.bg2} 55%)`:C.bg2,
        border:`1px solid ${flag?C.red+'44':C.border}`,borderRadius:11,padding:13,
        opacity:dragging?0.35:1,transition:'opacity .15s,transform .15s,border-color .15s',
        borderLeft:`${flag?4:3}px solid ${high?C.red:p.color}` }}
      onMouseEnter={e=>{ if(!urgent) e.currentTarget.style.borderColor=C.borderHi; }}
      onMouseLeave={e=>{ if(!urgent) e.currentTarget.style.borderColor=flag?C.red+'44':C.border; }}>
      <div style={{ display:'flex',justifyContent:'space-between',gap:8,marginBottom:7 }}>
        <span style={{ fontSize:13.5,fontWeight:high?700:600,lineHeight:1.3,
          display:'inline-flex',alignItems:'flex-start',gap:5 }} className="clamp2">
          {high && <Icon name="flag" size={13} color={C.red} style={{ marginTop:2,flex:'0 0 auto' }}/>}
          {task.title}
        </span>
        <Badge color={high?C.red:p.color} solid={high}>{high&&'⚡ '}{p.label}</Badge>
      </div>
      {task.desc && <p style={{ fontSize:12,color:C.textDim,marginBottom:9 }} className="clamp2">{task.desc}</p>}
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between' }}>
        <DueChip due={task.due} status={task.status}/>
        <div style={{ display:'flex',alignItems:'center',gap:6 }}>
          {task.comments.length>0 && <span style={{ fontSize:11,color:C.textDim,display:'inline-flex',alignItems:'center',gap:3 }}><Icon name="message" size={12}/>{task.comments.length}</span>}
          <Avatar id={task.assignedTo} size={24}/>
        </div>
      </div>
    </div>
  );
}

function RequestCard({ task, direction }){
  const { acceptRequest, declineRequest, resendRequest, dismissRequest } = useApp();
  const r=task.request; const p=PRIORITY[task.priority];
  const fromM=teamById(r.from), toM=teamById(r.to);
  const declined=r.status==='declined';
  return (
    <div style={{ background:C.bg2,border:`1px solid ${declined?C.red+'44':C.border}`,borderRadius:12,padding:14,
      borderLeft:`3px solid ${declined?C.red:p.color}` }}>
      <div style={{ display:'flex',justifyContent:'space-between',gap:8,marginBottom:6 }}>
        <span style={{ fontSize:14,fontWeight:700 }}>{task.title}</span>
        <Badge color={p.color}>{p.label}</Badge>
      </div>
      {task.desc && <p style={{ fontSize:12.5,color:C.textDim,marginBottom:10 }}>{task.desc}</p>}
      <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:direction==='incoming'||declined?12:0 }}>
        <DueChip due={task.due} status={task.status}/>
        <span style={{ marginLeft:'auto',fontSize:12,color:C.textDim,display:'inline-flex',alignItems:'center',gap:6 }}>
          {direction==='incoming'
            ? <><Avatar id={r.from} size={20}/> from {fromM.name}</>
            : declined
              ? <span style={{ color:C.red,fontWeight:700 }}>Declined by {toM.name}</span>
              : <><Avatar id={r.to} size={20}/> awaiting {toM.name}</>}
        </span>
      </div>
      {direction==='incoming' && (
        <div style={{ display:'flex',gap:8 }}>
          <Btn size="sm" icon="check" onClick={()=>acceptRequest(task.id)}>Accept</Btn>
          <Btn size="sm" variant="dark" onClick={()=>declineRequest(task.id)}>Decline</Btn>
        </div>
      )}
      {direction==='outgoing' && declined && (
        <div style={{ display:'flex',gap:8 }}>
          <Btn size="sm" variant="soft" icon="send" onClick={()=>resendRequest(task.id)}>Send again</Btn>
          <Btn size="sm" variant="danger" icon="trash" onClick={()=>dismissRequest(task.id)}>Dismiss</Btn>
        </div>
      )}
      {direction==='outgoing' && !declined && (
        <button onClick={()=>dismissRequest(task.id)} style={{ marginTop:10,fontSize:12,color:C.textDim,background:'none' }}>Cancel request</button>
      )}
    </div>
  );
}

function Tasks(){
  const { tasks, updateTask, user } = useApp();
  const [tab,setTab]=useState('board');
  const [view,setView]=useState('kanban');
  const [sortKey,setSortKey]=useState('priority');
  const [modal,setModal]=useState(false);
  const [reqModal,setReqModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [drag,setDrag]=useState(null);
  const [over,setOver]=useState(null);
  const [filterWho,setFilterWho]=useState('all');
  const [collapsedCols,setCollapsedCols]=useState({ completed:true });
  const toggleCol=(id)=>setCollapsedCols(c=>({ ...c, [id]:!c[id] }));

  /* board = real tasks (pending/declined requests live in the Requests tab) */
  const boardTasks=sortTasks(
    tasks.filter(t=>!t.request && (filterWho==='all'||t.assignedTo===filterWho)),
    sortKey);
  const reqs=tasks.filter(t=>t.request);
  const incoming=reqs.filter(t=>t.request.status==='pending' && t.request.to===user);
  const outgoing=reqs.filter(t=>t.request.from===user && (t.request.status==='pending'||t.request.status==='declined'));

  const openNew=()=>{ setEditing(null); setModal(true); };
  const openEdit=(t)=>{ setEditing(t); setModal(true); };

  const onDragStart=(e,id)=>{ setDrag(id); e.dataTransfer.effectAllowed='move'; };
  const onDrop=(status)=>{ if(drag){ updateTask(drag,{status}); } setDrag(null); setOver(null); };

  return (
    <div className="fade-in main-pad" style={{ padding:'26px 30px',overflowY:'auto',flex:1,display:'flex',flexDirection:'column' }}>
      <PageHead title="Tasks" sub="Shared board · drag cards between columns"
        actions={tab==='board'
          ? <Btn icon="plus" onClick={openNew}>New Task</Btn>
          : <Btn icon="send" onClick={()=>setReqModal(true)}>New Request</Btn>}/>

      <div style={{ display:'flex',gap:6,marginBottom:16,borderBottom:`1px solid ${C.border}` }}>
        {[{id:'board',label:'Board',icon:'check'},{id:'requests',label:'Requests',icon:'inbox'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{ display:'inline-flex',alignItems:'center',gap:7,
            padding:'9px 16px',fontSize:13.5,fontWeight:700,background:'none',position:'relative',
            color:tab===t.id?C.cyan:C.textDim,borderBottom:`2px solid ${tab===t.id?C.cyan:'transparent'}`,marginBottom:-1 }}>
            <Icon name={t.icon} size={16} color={tab===t.id?C.cyan:'currentColor'}/>{t.label}
            {t.id==='requests' && incoming.length>0 &&
              <span style={{ fontSize:10.5,fontWeight:800,color:'#06090c',background:C.gold,borderRadius:20,padding:'1px 6px',minWidth:17,textAlign:'center' }}>{incoming.length}</span>}
          </button>
        ))}
      </div>

      {tab==='requests' ? (
        <RequestsView incoming={incoming} outgoing={outgoing}/>
      ) : (<>
      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12 }}>
        <div style={{ display:'flex',gap:8,alignItems:'center',flexWrap:'wrap' }}>
          <span style={{ fontSize:12,color:C.textDim }}>Assignee:</span>
          <button onClick={()=>setFilterWho('all')} style={{ padding:'6px 12px',borderRadius:8,fontSize:12.5,fontWeight:600,
            background:filterWho==='all'?C.cyanDim:C.bg2,color:filterWho==='all'?C.cyan:C.textDim,border:`1px solid ${C.border}` }}>All</button>
          {ASSIGNEES.map(t=>(
            <button key={t.id} onClick={()=>setFilterWho(t.id)} style={{ padding:'5px 10px',borderRadius:8,fontSize:12.5,fontWeight:600,
              display:'inline-flex',alignItems:'center',gap:6,
              background:filterWho===t.id?`${t.color}22`:C.bg2,color:filterWho===t.id?t.color:C.textDim,border:`1px solid ${C.border}` }}>
              <Avatar id={t.id} size={20}/>{t.name}
            </button>
          ))}
        </div>
        <div style={{ display:'flex',gap:10,alignItems:'center' }}>
          <div style={{ display:'inline-flex',alignItems:'center',gap:6 }}>
            <span style={{ fontSize:12,color:C.textDim }}>Sort:</span>
            <select value={sortKey} onChange={e=>setSortKey(e.target.value)}
              style={{ background:C.bg2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px',fontSize:12.5,fontWeight:600 }}>
              {TASK_SORTS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div style={{ display:'flex',background:C.bg2,borderRadius:10,padding:4,border:`1px solid ${C.border}` }}>
            {['kanban','list'].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{ padding:'7px 16px',borderRadius:7,fontSize:13,fontWeight:600,textTransform:'capitalize',
                background:view===v?'linear-gradient(135deg,#1fc56a,#e0b73c)':'transparent',color:view===v?'#06090c':C.textDim }}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      {view==='kanban' ? (
        <div style={{ display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,flex:1,minHeight:0,alignItems:'start' }} className="grid-resp">
          {TASK_COLS.map(col=>{
            const list=boardTasks.filter(t=>t.status===col.id);
            const collapsed=!!collapsedCols[col.id];
            return (
              <div key={col.id}
                onDragOver={e=>{e.preventDefault();setOver(col.id);}}
                onDragLeave={()=>setOver(o=>o===col.id?null:o)}
                onDrop={()=>onDrop(col.id)}
                style={{ display:'flex',flexDirection:'column',background:over===col.id?'rgba(31,197,106,0.08)':C.panel,
                  border:`1px solid ${over===col.id?C.borderHi:C.border}`,borderRadius:14,padding:12,
                  transition:'background .15s,border-color .15s',minHeight:collapsed?0:200,alignSelf:'start' }}>
                <div onClick={()=>toggleCol(col.id)}
                  style={{ display:'flex',alignItems:'center',gap:8,marginBottom:collapsed?0:12,paddingBottom:collapsed?0:10,
                    borderBottom:collapsed?'none':`1px solid ${C.border}`,cursor:'pointer',userSelect:'none' }}>
                  <span style={{ width:9,height:9,borderRadius:'50%',background:col.color,boxShadow:`0 0 8px ${col.color}` }}/>
                  <span style={{ fontSize:13.5,fontWeight:700 }}>{col.label}</span>
                  <span style={{ marginLeft:'auto',fontSize:12,fontWeight:700,color:C.textDim,background:C.bg3,padding:'2px 9px',borderRadius:20 }}>{list.length}</span>
                  <Icon name={collapsed?'chevR':'chevD'} size={16} color={C.textDim} style={{ marginLeft:2 }}/>
                </div>
                {!collapsed && (
                  <div style={{ display:'flex',flexDirection:'column',gap:10,flex:1,overflowY:'auto' }}>
                    {list.map(t=><TaskCard key={t.id} task={t} dragging={drag===t.id} onClick={()=>openEdit(t)} onDragStart={onDragStart} onDragEnd={()=>setDrag(null)}/>)}
                    {!list.length && <div style={{ fontSize:12,color:C.textMuted,textAlign:'center',padding:'20px 0',border:`1px dashed ${C.border}`,borderRadius:10 }}>Drop here</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <Card pad={0} style={{ overflow:'hidden' }}>
          {boardTasks.map((t,i)=>{ const p=PRIORITY[t.priority]; const col=TASK_COLS.find(c=>c.id===t.status);
            const active=t.status!=='completed'; const high=t.priority==='high'&&active;
            const urgent=dueMeta(t.due,t.status).level==='overdue'; const flag=high||urgent;
            return (
              <div key={t.id} onClick={()=>openEdit(t)} style={{ display:'flex',alignItems:'center',gap:14,padding:'14px 18px',
                borderBottom:i<boardTasks.length-1?`1px solid ${C.border}`:'none',cursor:'pointer',
                background:flag?`linear-gradient(90deg, ${C.red}12, transparent 40%)`:'transparent',
                borderLeft:`${flag?4:3}px solid ${high?C.red:p.color}` }}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg2}
                onMouseLeave={e=>e.currentTarget.style.background=flag?`linear-gradient(90deg, ${C.red}12, transparent 40%)`:'transparent'}>
                <span style={{ width:9,height:9,borderRadius:'50%',background:col.color,flex:'0 0 auto' }}/>
                <div style={{ flex:1,minWidth:0 }}>
                  <div style={{ fontSize:14,fontWeight:high?700:600,display:'inline-flex',alignItems:'center',gap:6 }} className="clamp1">
                    {high && <Icon name="flag" size={13} color={C.red} style={{ flex:'0 0 auto' }}/>}{t.title}</div>
                  {t.desc && <div style={{ fontSize:12,color:C.textDim }} className="clamp1">{t.desc}</div>}
                </div>
                <Badge color={high?C.red:p.color} solid={high}>{high&&'⚡ '}{p.label}</Badge>
                <DueChip due={t.due} status={t.status}/>
                <Avatar id={t.assignedTo} size={28}/>
              </div>
            ); })}
          {!boardTasks.length && <div style={{ padding:'40px 0',textAlign:'center',fontSize:13,color:C.textMuted }}>No tasks here yet.</div>}
        </Card>
      )}
      </>)}

      <TaskModal open={modal} onClose={()=>setModal(false)} initial={editing}/>
      <TaskModal open={reqModal} onClose={()=>setReqModal(false)} asRequest/>
    </div>
  );
}

function RequestsView({ incoming, outgoing }){
  const empty=!incoming.length && !outgoing.length;
  return (
    <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start' }} className="grid-resp">
      <div>
        <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:12 }}>
          <Icon name="inbox" size={17} color={C.cyan}/>
          <span style={{ fontSize:14,fontWeight:700 }}>Needs your response</span>
          <span style={{ fontSize:12,fontWeight:700,color:C.textDim,background:C.bg3,padding:'2px 9px',borderRadius:20 }}>{incoming.length}</span>
        </div>
        <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
          {incoming.map(t=><RequestCard key={t.id} task={t} direction="incoming"/>)}
          {!incoming.length && <div style={{ fontSize:12.5,color:C.textMuted,padding:'24px 0',textAlign:'center',border:`1px dashed ${C.border}`,borderRadius:12 }}>No requests waiting on you.</div>}
        </div>
      </div>
      <div>
        <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:12 }}>

function IdeaModal({ open, onClose, initial }){
  const { addIdea, updateIdea, delIdea, addIdeaComment, promoteIdea } = useApp();
  const blank={ title:'',desc:'' };
  const [f,setF]=useState(initial||blank);
  const [cm,setCm]=useState('');
  useEffect(()=>{ setF(initial||blank); setCm(''); },[initial,open]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{ if(!f.title)return; initial?updateIdea(initial.id,{title:f.title,desc:f.desc}):addIdea(f); onClose(); };
  return (
    <Modal open={open} onClose={onClose} title={initial?'Idea':'New Idea'} width={560}
      footer={<>
        {initial && <Btn variant="danger" icon="trash" onClick={()=>{delIdea(initial.id);onClose();}} style={{ marginRight:'auto' }}>Delete</Btn>}
        {initial && <Btn variant="soft" icon="check" onClick={()=>{promoteIdea(initial.id);onClose();}}>Promote to Task</Btn>}
        <Btn variant="dark" onClick={onClose}>Close</Btn>
        <Btn onClick={save}>{initial?'Save':'Post'}</Btn>
      </>}>
      <Field label="Idea"><input value={f.title} onChange={e=>set('title',e.target.value)} placeholder="What's the idea?"/></Field>
      <Field label="Details / brainstorm"><textarea rows={4} value={f.desc} onChange={e=>set('desc',e.target.value)} placeholder="Flesh it out, notes, pros/cons..."/></Field>
      {initial && (
        <div style={{ marginTop:8 }}>
          <label>Build on it</label>
          <div style={{ display:'flex',flexDirection:'column',gap:8,marginBottom:10 }}>
            {(initial.comments||[]).map((c,i)=>(
              <div key={i} style={{ display:'flex',gap:8,alignItems:'flex-start' }}>

                <div style={{ background:C.bg3,borderRadius:9,padding:'7px 11px',fontSize:13,flex:1 }}>

function Finance(){
  const { appts } = useApp();
  const [range,setRange]=useState('month');
  const live=appts.filter(a=>a.status!=='cancelled');
  const bd=serviceBreakdown(live);
  const monthTotal=bd.reduce((s,x)=>s+x.value,0);
  const priced=live.filter(a=>a.price>0);
  const avgTicket=priced.length?Math.round(priced.reduce((s,a)=>s+a.price,0)/priced.length):null;
  const now=new Date(NOW);
  const mStart=localISO(new Date(now.getFullYear(),now.getMonth(),1));
  const qStart=localISO(new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1));
  const yStart=localISO(new Date(now.getFullYear(),0,1));
  const ws=localISO(startOfWeek(now));
  const stat={ day:sumRange(live,TODAY,TODAY), week:sumRange(live,ws,TODAY), month:sumRange(live,mStart,TODAY), quarter:sumRange(live,qStart,TODAY), year:sumRange(live,yStart,TODAY) };
  const monthly=revMonthly(live);
  const jobsThisMonth=live.filter(a=>a.date>=mStart&&a.date<=TODAY).length;
  const ceramicRev=live.filter(a=>a.service==='ceramic'&&a.date>=mStart&&a.date<=TODAY).reduce((s,a)=>s+(a.price||0),0);

  return (
    <div className="fade-in main-pad" style={{ padding:'26px 30px',overflowY:'auto',flex:1 }}>
      <PageHead title="Finance" sub="Revenue from booked jobs (GoHighLevel)"/>

      {/* Period selector + totals */}
      <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:14,marginBottom:18 }} className="grid-resp">
        {[
          { k:'day',l:'Today',v:stat.day,c:C.cyan },
          { k:'week',l:'This Week',v:stat.week,c:C.cyanBright },
          { k:'month',l:'This Month',v:stat.month,c:C.green },
          { k:'quarter',l:'Quarter',v:stat.quarter,c:C.gold },
          { k:'year',l:'Year',v:stat.year,c:C.purple },
        ].map(x=>(
          <Card key={x.k} pad={16} hover onClick={()=>setRange(x.k)}
            style={{ borderColor:range===x.k?x.c+'66':C.border,background:range===x.k?`${x.c}10`:C.panel }}>
            <div style={{ fontSize:11.5,color:C.textDim,fontWeight:600,letterSpacing:.5,textTransform:'uppercase' }}>{x.l}</div>
            <div style={{ fontSize:24,fontWeight:800,color:range===x.k?x.c:C.text,marginTop:6 }}>{fmt$(x.v)}</div>
          </Card>
        ))}
      </div>

      <div style={{ display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:16,marginBottom:16 }} className="grid-resp">
        <Card pad={20}>
          <h3 style={{ fontSize:15,fontWeight:700,marginBottom:4 }}>Monthly Revenue</h3>
          <p style={{ fontSize:12,color:C.textDim,marginBottom:14 }}>Last 6 months from booked jobs</p>
          <ResponsiveContainer width="100%" height={250}>
            <BarChart data={monthly} margin={{ top:5,right:8,left:-18,bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" vertical={false}/>
              <XAxis dataKey="month" tick={{ fontSize:11 }} axisLine={false} tickLine={false}/>
              <YAxis tick={{ fontSize:10 }} axisLine={false} tickLine={false} tickFormatter={v=>'$'+v/1000+'k'}/>
              <RTooltip content={<ChartTip money/>} cursor={{ fill:'rgba(31,197,106,0.06)' }}/>
              <Bar dataKey="revenue" radius={[5,5,0,0]} name="Revenue">
                {monthly.map((e,i)=><Cell key={i} fill={C.green}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </Card>

        <Card pad={20}>
          <h3 style={{ fontSize:15,fontWeight:700,marginBottom:14 }}>Revenue by Service</h3>
          <ResponsiveContainer width="100%" height={200}>
            <PieChart>
              <Pie data={bd} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} stroke="none">
                {bd.map((e,i)=><Cell key={i} fill={e.color}/>)}
              </Pie>
              <RTooltip content={<ChartTip money/>}/>
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display:'flex',flexDirection:'column',gap:7,marginTop:10 }}>
            {bd.map(e=>(
              <div key={e.key} style={{ display:'flex',alignItems:'center',gap:8,fontSize:12.5 }}>
                <span style={{ width:9,height:9,borderRadius:2,background:e.color }}/>
                <span style={{ flex:1,color:C.textDim }}>{e.name}</span>
                <span style={{ fontWeight:700 }}>{fmt$(e.value)}</span>
                <span style={{ color:C.textMuted,minWidth:34,textAlign:'right' }}>{pct(e.value,monthTotal)}%</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14,marginBottom:16 }} className="grid-resp">
        <KPI label="Avg Ticket" value={avgTicket!=null?fmt$(avgTicket):BLANK} icon="chart" color={C.cyan}/>
        <KPI label="Customer LTV" value={BLANK} icon="users" color={C.purple} sub="needs setup"/>
        <KPI label="Total Jobs (mo)" value={jobsThisMonth} icon="car" color={C.gold}/>
        <KPI label="Ceramic Revenue (mo)" value={fmt$(ceramicRev)} icon="star" color={C.pink} sub={monthTotal?pct(ceramicRev,monthTotal)+'% of total':''}/>
        <KPI label="Outstanding" value={BLANK} icon="alert" color={C.red} sub="invoices not connected"/>
      </div>

      <Card pad={0} style={{ overflow:'hidden' }}>
        <div style={{ padding:'16px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center' }}>
          <h3 style={{ fontSize:15,fontWeight:700 }}>Invoices</h3>
        </div>
        <div style={{ padding:'30px 20px',textAlign:'center',color:C.textDim,fontSize:13 }}>
          Invoices aren't connected yet. We'll wire GoHighLevel invoices/payments here when ready.
        </div>
      </Card>
    </div>
  );
}
