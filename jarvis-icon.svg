<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020610"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#b8eeff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#39c2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39c2ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#39c2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Outermost ring glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#39c2ff" stroke-width="3" stroke-opacity="0.15" filter="url(#blur1)"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#39c2ff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Segmented outer ring -->
  <g fill="none" stroke="#4dd4ff" stroke-width="12" stroke-opacity="0.7" stroke-linecap="round">
    <path d="M256 76 A180 180 0 0 1 410 150" fill="none"/>
    <path d="M420 164 A180 180 0 0 1 436 256" fill="none"/>
    <path d="M436 270 A180 180 0 0 1 410 362" fill="none"/>
    <path d="M400 372 A180 180 0 0 1 326 426" fill="none"/>
    <path d="M312 430 A180 180 0 0 1 200 430" fill="none"/>
    <path d="M186 426 A180 180 0 0 1 112 372" fill="none"/>
    <path d="M102 362 A180 180 0 0 1 76 270" fill="none"/>
    <path d="M76 256 A180 180 0 0 1 102 150" fill="none"/>
    <path d="M112 140 A180 180 0 0 1 186 86" fill="none"/>
    <path d="M200 82 A180 180 0 0 1 256 76" fill="none"/>
  </g>

  <!-- Segmented outer ring glow layer -->
  <g fill="none" stroke="#39c2ff" stroke-width="16" stroke-opacity="0.2" stroke-linecap="round" filter="url(#blur2)">
    <path d="M256 76 A180 180 0 0 1 410 150"/>
    <path d="M420 164 A180 180 0 0 1 436 256"/>
    <path d="M436 270 A180 180 0 0 1 410 362"/>
    <path d="M400 372 A180 180 0 0 1 326 426"/>
    <path d="M312 430 A180 180 0 0 1 200 430"/>
    <path d="M186 426 A180 180 0 0 1 112 372"/>
    <path d="M102 362 A180 180 0 0 1 76 270"/>
    <path d="M76 256 A180 180 0 0 1 102 150"/>
    <path d="M112 140 A180 180 0 0 1 186 86"/>
    <path d="M200 82 A180 180 0 0 1 256 76"/>
  </g>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="145" fill="none" stroke="#39c2ff" stroke-width="2" stroke-opacity="0.6" filter="url(#blur3)"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#5ce0ff" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- Tick marks on middle ring -->
  <g stroke="#7fe3ff" stroke-width="2" stroke-opacity="0.6">
    <line x1="256" y1="111" x2="256" y2="121"/>
    <line x1="256" y1="391" x2="256" y2="401"/>
    <line x1="111" y1="256" x2="121" y2="256"/>
    <line x1="391" y1="256" x2="401" y2="256"/>
    <line x1="153.5" y1="153.5" x2="160.5" y2="160.5"/>
    <line x1="351.5" y1="351.5" x2="358.5" y2="358.5"/>
    <line x1="351.5" y1="153.5" x2="358.5" y2="160.5"/>
    <line x1="153.5" y1="351.5" x2="160.5" y2="358.5"/>
  </g>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="105" fill="none" stroke="#39c2ff" stroke-width="2.5" stroke-opacity="0.5" filter="url(#blur3)"/>
  <circle cx="256" cy="256" r="105" fill="none" stroke="#5ce0ff" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Connector lines from inner to middle ring -->
  <g stroke="#39c2ff" stroke-width="1.5" stroke-opacity="0.4">
    <line x1="256" y1="151" x2="256" y2="111"/>
    <line x1="256" y1="361" x2="256" y2="401"/>
    <line x1="151" y1="256" x2="111" y2="256"/>
    <line x1="361" y1="256" x2="401" y2="256"/>
  </g>

  <!-- Innermost ring -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#4dd4ff" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#39c2ff" stroke-width="6" stroke-opacity="0.15" filter="url(#blur2)"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="55" fill="url(#core)"/>
  <circle cx="256" cy="256" r="40" fill="#0d2847" fill-opacity="0.6"/>

  <!-- J.A.R.V.I.S text -->
  <text x="256" y="262" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI','Arial',sans-serif" font-size="28" font-weight="700" letter-spacing="4" fill="#b8eeff">J.A.R.V.I.S</text>

  <!-- Small decorative dots -->
  <g fill="#7fe3ff" fill-opacity="0.8">
    <circle cx="256" cy="186" r="3"/>
    <circle cx="256" cy="326" r="3"/>
    <circle cx="186" cy="256" r="3"/>
    <circle cx="326" cy="256" r="3"/>
  </g>
</svg>
